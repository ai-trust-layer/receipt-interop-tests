name: Interop
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ main ]
jobs:
  interop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone JS SDK
        run: git clone https://github.com/ai-trust-layer/receipt-sdk-js.git receipt-sdk-js

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS deps
        run: |
          cd receipt-sdk-js
          npm ci || npm i

      - name: Clone Py SDK
        run: git clone https://github.com/ai-trust-layer/receipt-sdk-py.git receipt-sdk-py

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Py deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pynacl

      - name: Run interop
        env:
          PY: python3
          PYTHONPATH: ${{ github.workspace }}/receipt-sdk-py
        run: node runner/interop.mjs
