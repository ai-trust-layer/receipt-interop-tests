name: Interop Suite
on:
  workflow_call:
    inputs:
      schema-path:
        required: true
        type: string
      node-version:
        required: false
        type: string
        default: '20'
jobs:
  interop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout interop suite
        uses: actions/checkout@v4
        with: { path: interop }

      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: ${{ inputs.node-version }} }

      - name: Install runner deps
        working-directory: interop/runner
        run: npm ci || npm i

      - name: Run interop against provided schema
        working-directory: interop/runner
        env:
          SCHEMA: ${{ github.workspace }}/${{ inputs.schema-path }}
        run: node run.mjs

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: interop-report
          path: interop/report.json
